<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Skin Disease AI</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f8fb;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      width: 420px;
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      text-align: center;
    }

    h1 {
      color: #2c3e50;
      margin-bottom: 10px;
    }

    p {
      color: #666;
      margin-bottom: 25px;
    }

    .upload-box {
      border: 2px dashed #3498db;
      padding: 25px;
      border-radius: 15px;
      margin-bottom: 20px;
    }

    input[type="file"] {
      width: 100%;
    }

    button {
      background: #3498db;
      color: white;
      border: none;
      padding: 12px 35px;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #217dbb;
    }

    .icon {
      font-size: 45px;
    }
  </style>

</head>

<body>

<div class="container">

  <div class="icon">🩺</div>

  <h1>Skin Disease AI</h1>

  <p>
    Upload a skin image and get AI-based disease prediction.
  </p>

  <form method="post" enctype="multipart/form-data">

    <div class="upload-box">
      <input type="file" name="image" accept="image/*" required>
    </div>

    <button type="submit">
      Predict Disease
    </button>

  </form>

</div>

</body>
</html>
